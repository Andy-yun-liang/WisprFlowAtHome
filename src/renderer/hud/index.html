<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhisprAtHome HUD</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #hud {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    #hud.visible {
      opacity: 1;
    }

    .pill {
      background: rgba(20, 20, 20, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 200px;
      max-width: 380px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #888;
      transition: background 0.2s;
    }

    .indicator.recording {
      background: #ff3b30;
      animation: pulse 1s ease-in-out infinite;
    }

    .indicator.processing {
      background: #ffcc00;
    }

    .indicator.error {
      background: #ff453a;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    #canvas-container {
      flex: 1;
      height: 40px;
      display: none;
    }

    #canvas-container.visible {
      display: block;
    }

    #waveform {
      width: 100%;
      height: 100%;
    }

    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: #ffcc00;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .spinner.visible {
      display: block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #transcript {
      color: rgba(255,255,255,0.92);
      font-size: 13px;
      line-height: 1.4;
      flex: 1;
      display: none;
      word-break: break-word;
    }

    #transcript.visible {
      display: block;
    }

    #error-msg {
      color: #ff453a;
      font-size: 12px;
      flex: 1;
      display: none;
    }

    #error-msg.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="pill">
      <div class="indicator" id="indicator"></div>
      <div id="canvas-container">
        <canvas id="waveform"></canvas>
      </div>
      <div class="spinner" id="spinner"></div>
      <div id="transcript"></div>
      <div id="error-msg"></div>
    </div>
  </div>
  <script type="module" src="./hud.ts"></script>
</body>
</html>
