<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhisprAtHome Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #242424;
      color: #e0e0e0;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Layout ── */
    .app-layout {
      display: flex;
      width: 100%;
      height: 100%;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 200px;
      flex-shrink: 0;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      padding: 16px 8px;
      gap: 2px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      color: #c0c0c0;
      font-size: 13px;
      font-weight: 500;
      user-select: none;
      transition: background 0.1s, color 0.1s;
    }

    .nav-item:hover {
      background: #2a2a2a;
      color: #e0e0e0;
    }

    .nav-item.active {
      background: #2563eb;
      color: #fff;
    }

    .nav-icon {
      font-size: 15px;
      width: 20px;
      text-align: center;
    }

    /* ── Content area ── */
    .content {
      flex: 1;
      background: #242424;
      padding: 28px 28px 24px;
      overflow-y: auto;
    }

    .section {
      display: none;
      flex-direction: column;
      gap: 20px;
    }

    .section.active {
      display: flex;
    }

    .section-heading {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    /* ── Settings rows ── */
    .settings-group {
      display: flex;
      flex-direction: column;
      gap: 0;
      border-radius: 8px;
      overflow: hidden;
      background: #2a2a2a;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #333;
    }

    .settings-row:last-child {
      border-bottom: none;
    }

    .row-label {
      font-size: 13px;
      color: #e0e0e0;
      font-weight: 500;
    }

    .row-control {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Hotkey badge ── */
    .hotkey-badge {
      display: inline-block;
      background: #3a3a3a;
      border-radius: 5px;
      padding: 3px 10px;
      font-size: 12px;
      color: #c0c0c0;
      font-family: -apple-system, BlinkMacSystemFont, monospace;
    }

    /* ── Segmented control ── */
    .segmented {
      display: flex;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #3a3a3a;
    }

    .segmented-btn {
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: #2a2a2a;
      color: #aaa;
      border: none;
      transition: background 0.15s, color 0.15s;
    }

    .segmented-btn.active {
      background: #2563eb;
      color: #fff;
    }

    /* ── Toggle switch ── */
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle input {
      display: none;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #3a3a3a;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::after {
      content: '';
      position: absolute;
      left: 2px;
      top: 2px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: #2563eb;
    }

    .toggle input:checked + .toggle-slider::after {
      transform: translateX(16px);
    }

    /* ── Buttons ── */
    .btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
    }

    .btn-secondary {
      background: #3a3a3a;
      color: #e0e0e0;
    }

    /* ── Inputs ── */
    input[type="text"],
    input[type="password"] {
      background: #1e1e1e;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      padding: 6px 10px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #2563eb;
    }

    select {
      background: #1e1e1e;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      padding: 5px 8px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }

    select:focus {
      border-color: #2563eb;
    }

    /* ── Status message ── */
    .status-msg {
      font-size: 11px;
      color: #4ade80;
      min-height: 14px;
    }

    .status-msg.error {
      color: #ff453a;
    }

    /* ── API key row ── */
    .api-key-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .api-key-row input {
      width: 240px;
    }

    /* ── Filler word chips ── */
    .word-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      transition: opacity 0.2s;
    }

    .word-grid.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .word-chip {
      padding: 6px 10px;
      border-radius: 20px;
      border: none;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: #3a3a3a;
      color: #c0c0c0;
      transition: background 0.15s, color 0.15s;
      text-align: center;
    }

    .word-chip.active {
      background: #2563eb;
      color: #fff;
    }

    /* ── About section ── */
    .about-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding-top: 20px;
    }

    .about-icon {
      width: 64px;
      height: 64px;
    }

    .about-title {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
    }

    .about-version {
      font-size: 13px;
      color: #888;
    }

    .about-pricing {
      font-size: 12px;
      color: #666;
    }

    /* ── Hotkey capture ── */
    #hotkey-capture-hint {
      font-size: 11px;
      color: #888;
      display: none;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="nav-item active" data-section="general">
        <span class="nav-icon">⚙️</span>
        <span>General</span>
      </div>
      <div class="nav-item" data-section="transcription">
        <span class="nav-icon">🎙️</span>
        <span>Transcription</span>
      </div>
      <div class="nav-item" data-section="text-cleanup">
        <span class="nav-icon">✂️</span>
        <span>Text Cleanup</span>
      </div>
      <div class="nav-item" data-section="about">
        <span class="nav-icon">ℹ️</span>
        <span>About</span>
      </div>
    </nav>

    <!-- Content -->
    <main class="content">

      <!-- General -->
      <div class="section active" id="section-general">
        <div class="section-heading">General</div>
        <div class="settings-group">
          <!-- PTT Hotkey -->
          <div class="settings-row">
            <span class="row-label">PTT Hotkey</span>
            <div class="row-control">
              <span class="hotkey-badge" id="hotkey-badge">Ctrl+Alt</span>
              <button class="btn btn-secondary" id="hotkey-edit-btn">Edit</button>
              <span id="hotkey-capture-hint">Press your hotkey…</span>
            </div>
          </div>
          <!-- HUD Position -->
          <div class="settings-row">
            <span class="row-label">HUD Position</span>
            <div class="row-control">
              <div class="segmented">
                <button class="segmented-btn active" data-pos="top" id="hud-pos-top">Top</button>
                <button class="segmented-btn" data-pos="bottom" id="hud-pos-bottom">Bottom</button>
              </div>
            </div>
          </div>
          <!-- Launch at Login -->
          <div class="settings-row">
            <span class="row-label">Launch at Login</span>
            <div class="row-control">
              <label class="toggle">
                <input type="checkbox" id="autostart-toggle" />
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
        </div>
      </div>

      <!-- Transcription -->
      <div class="section" id="section-transcription">
        <div class="section-heading">Transcription</div>
        <div class="settings-group">
          <!-- API Key -->
          <div class="settings-row">
            <span class="row-label">API Key</span>
            <div class="row-control" style="flex-direction: column; align-items: flex-end; gap: 4px;">
              <div class="api-key-row">
                <input type="password" id="api-key" placeholder="sk-..." autocomplete="off" />
                <button class="btn btn-primary" id="save-key-btn">Save</button>
              </div>
              <div class="status-msg" id="key-status"></div>
            </div>
          </div>
          <!-- Whisper Model -->
          <div class="settings-row">
            <span class="row-label">Model</span>
            <div class="row-control">
              <select id="model-select">
                <option value="whisper-1">whisper-1 (default)</option>
                <option value="whisper-large-v3-turbo">whisper-large-v3-turbo (faster)</option>
              </select>
            </div>
          </div>
          <!-- Language -->
          <div class="settings-row">
            <span class="row-label">Language</span>
            <div class="row-control">
              <select id="language-select">
                <option value="auto">Auto-detect</option>
                <option value="en">English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="pt">Portuguese</option>
                <option value="ja">Japanese</option>
                <option value="zh">Chinese</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- Text Cleanup -->
      <div class="section" id="section-text-cleanup">
        <div class="section-heading">Text Cleanup</div>
        <div class="settings-group">
          <!-- Master toggle -->
          <div class="settings-row">
            <span class="row-label">Remove filler words</span>
            <div class="row-control">
              <label class="toggle">
                <input type="checkbox" id="filler-toggle" />
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
        </div>
        <!-- Word chips -->
        <div class="word-grid" id="word-grid">
          <!-- chips injected by settings.ts -->
        </div>
      </div>

      <!-- About -->
      <div class="section" id="section-about">
        <div class="section-heading">About</div>
        <div class="about-center">
          <img class="about-icon" src="../../resources/tray-idle.png" alt="App icon" />
          <div class="about-title">WhisprAtHome</div>
          <div class="about-version">Version 1.0.0</div>
          <div class="about-pricing">Whisper API pricing: $0.006 / min</div>
          <button class="btn btn-secondary" id="check-updates-btn">Check for updates</button>
        </div>
      </div>

    </main>
  </div>
  <script type="module" src="./settings.ts"></script>
</body>
</html>
